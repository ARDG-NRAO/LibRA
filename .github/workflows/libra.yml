name: Libra CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync and update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up CCache
        run: |
          echo "CCACHE_BASEDIR=$PWD" >> $GITHUB_ENV
          echo "CCACHE_DIR=$PWD/ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
          git clean -ffdx
          ccache --zero-stats || true
          ccache --show-stats || true

      - name: Compile the code
        run: |
          echo "Compiling the code..."
          echo $PATH
          nvidia-smi
          which nvcc
          mkdir build
          cd build
          cmake -DApps_BUILD_TESTS=ON -DKokkos_CUDA_ARCH_NAME=VOLTA70 ..
          make
          echo "Compilation complete."

      - name: Show CCache stats
        run: |
          export CCACHE_DIR="$PWD/ccache"
          ccache --show-stats || true

      - name: Run unit tests
        run: |
          base_path=$PWD
          export LD_LIBRARY_PATH=${base_path}/install/lib:$LD_LIBRARY_PATH
          mkdir -p ${base_path}/reports
          # Top-level build/Libra/CTestTestfile.cmake recurses into both src/ and
          # apps/ ExternalProject build trees. -R '^test_' picks up the new-style
          # gtest binaries (test_dale, test_libracoretypes, ...) and skips the
          # legacy t<Name> tests in src/.
          ctest --test-dir ${base_path}/build/Libra \
                -R '^test_' \
                --output-on-failure \
                --output-junit "${base_path}/reports/cpp_ctest_report.xml"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Report
          path: ${{ github.workspace }}/reports/cpp_ctest_report.xml
